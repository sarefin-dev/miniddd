spring:
  application:
    name: miniddd
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/miniddd}
    username: ${DB_USERNAME:miniddd}
    password: ${DB_PASSWORD:miniddd}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

miniddd:
  outbox:
    polling-interval-ms: 2000
